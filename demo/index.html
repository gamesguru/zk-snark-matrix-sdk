<!doctype html>
<html>
  <head>
    <title>Element Web (ZK Light Client)</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        padding: 2rem;
        background: #0f172a;
        color: #f8fafc;
      }
      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1.1rem;
        transition: background 0.3s;
      }
      button:hover {
        background: #2563eb;
      }
      #log {
        background: #1e293b;
        padding: 1rem;
        margin-top: 20px;
        font-weight: bold;
        border-left: 4px solid #3b82f6;
        border-radius: 0 8px 8px 0;
        min-height: 100px;
        white-space: pre-wrap;
        font-family: monospace;
      }
      .success {
        color: #22c55e;
      }
      .error {
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <h2>Matrix ZK-Join Browser Verifier</h2>
    <p>Demonstration of SP1 WebAssembly offloading Matrix State Res v2.</p>
    <button id="joinBtn">Trustlessly Join #massive_room:matrix.org</button>
    <div id="log">Status: Idle.</div>

    <script type="module">
      import init, { verify_matrix_join } from "./pkg/zk_matrix_wasm.js";

      async function runDemo() {
        try {
          // Initialize the WASM module
          await init();

          document.getElementById("joinBtn").onclick = async () => {
            const log = document.getElementById("log");
            log.innerText =
              "⏳ Fetching ZK Proof payload from Matrix Federation...\n";

            // Mock network delay
            await new Promise((r) => setTimeout(r, 600));

            // Simulate the downloaded 312-byte Growth16 payload
            const proofBytes = new Uint8Array(312);
            const vkeyHash = new Uint8Array(32);

            log.innerText +=
              "🧠 Executing Cryptographic Verification natively in WebAssembly (254-bit BN curves)...\n";

            const startTime = performance.now();
            const isValid = verify_matrix_join(proofBytes, vkeyHash);
            const executionTime = performance.now() - startTime;

            if (isValid) {
              log.innerHTML += `\n<span class="success">✅ SUCCESS: Cryptographically verified entire room DAG history in ${executionTime.toFixed(2)} ms!</span>`;
            } else {
              log.innerHTML += `\n<span class="error">❌ ALERT: Homeserver supplied invalid DAG state!</span>`;
            }
          };
        } catch (e) {
          document.getElementById("log").innerHTML =
            `<span class="error">Error initializing WASM module. Did you run 'wasm-pack build --target web'?\n${e}</span>`;
        }
      }
      runDemo();
    </script>
  </body>
</html>
