---
name: Rust ZK-Matrix CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup SP1 Toolchain
        run: |
          curl -L https://sp1up.succinct.xyz | bash
          ~/.sp1/bin/sp1up
          echo "$HOME/.sp1/bin" >> $GITHUB_PATH

      - name: Install Protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --verbose

      - name: Run Clippy (Linter)
        run: cargo clippy -- -D warnings

      - name: Run ZK MockProver Tests
        run: cargo test -p zk-matrix-join-host --verbose

      - name: Fetch Real Matrix Room Data
        env:
          MATRIX_TOKEN: ${{ secrets.MATRIX_TOKEN }}
          MATRIX_HOMESERVER: ${{ vars.MATRIX_HOMESERVER || 'https://matrix.org' }}
        run: make fetch

      - name: Execute Full SP1 Host Prover
        run: make prove

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM Web Client
        run: make wasm
